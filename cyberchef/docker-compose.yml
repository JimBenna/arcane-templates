x-arcane:
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/cyberchef.svg
  urls:
    - https://gchq.github.io/CyberChef/
services:
    cyberchef:
        image: ghcr.io/gchq/cyberchef:latest
        container_name: cyberchef
        ports:
            - 8082:8080
        stdin_open: true
        tty: true
        restart: unless-stopped
        networks:
        - cyberchef
        healthcheck:
          test: |
            sh -c sh -c '/usr/bin/wget -q -O- http://localhost:8080 > /dev/null && 
               echo "Runner healthy" || exit 1'
          interval: 30s
          timeout: 10s
          retries: 3
        labels:
          com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/cyberchef.svg
networks:
  cyberchef:
   name: cyberchef_bridge
   driver: bridge
