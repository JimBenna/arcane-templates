x-arcane:
  icon: https://artoflivingretreatcenter.org/wp-content/uploads/hope_icon.svg
  urls:
    - https://github.com/willfarrell/docker-autoheal
services:
# The auto-healer watches other containers and restarts unhealthy ones
  autoheal:
    deploy:
      replicas: 1
    image: willfarrell/autoheal:latest
    restart: always
    container_name: AutoHeal
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal-app
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 60
    network_mode: none
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      com.getarcaneapp.arcane.icon: https://artoflivingretreatcenter.org/wp-content/uploads/hope_icon.svg