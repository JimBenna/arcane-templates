x-arcane:
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/it-tools.svg
  urls:
    - https://it-tools.tech/
services:
    it-tools:
        image: ghcr.io/corentinth/it-tools:latest
        container_name: it-tools
        ports:
            - 8081:80
        restart: unless-stopped
        networks:
        - ittools
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost"]
          interval: 30s
          timeout: 10s
          retries: 3
        labels:
          com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/it-tools.svg
networks:
  ittools:
   name: ittools_bridge
   driver: bridge
