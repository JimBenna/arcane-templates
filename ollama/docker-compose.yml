x-arcane:
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/ollama.svg
  urls:
    - https://ollama.com/
services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    restart: unless-stopped
    environment:
      - UID=${UID}
      - GID=${GID}
    ports:
      - "11434:11434"
    volumes:
      - ${ROOT_VOLUME_PATH}/ollama/ollama_data:/root/.ollama
    networks:
      - ollama_subnet
    labels:
      com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/ollama.svg
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "53000:8080"
    volumes:
      - ${ROOT_VOLUME_PATH}/ollama/open_webui_data:/app/backend/data
    environment:
      - UID=${UID}
      - GID=${GID}
      - OLLAMA_BASE_URL=${BASE_URL}
    depends_on:
      - ollama
    networks:
      - ollama_subnet
    labels:
      com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/open-webui.svg
networks:
  ollama_subnet:
    name: ollama_net
    internal: false
    ipam:
      driver: default
      config:
        - subnet: 192.168.252.0/29
