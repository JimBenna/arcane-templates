x-arcane:
  icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/forgejo.svg
  urls:
    - https://forgejo.org/
services:
  
# ===== FORGEJO =====   
  forgejo:
    image: codeberg.org/forgejo/forgejo:15
    container_name: forgejo
    environment:
      - HEALTHCHECK_LOG_ERROR=true
      - FORGEJO__database__DB_TYPE=postgres
      - FORGEJO__database__HOST=forgejo-db:5432
      - FORGEJO__database__NAME=${FORGEJO_DB_NAME}
      - FORGEJO__database__USER=${FORGEJO_DB_USERNAME}
      - FORGEJO__database__PASSWD=${FORGEJO_DB_PASSWORD}
    restart: unless-stopped
#    user: ${UID}:${GID}
    networks:
      forgejo_db_net:
        ipv4_address: 192.168.254.2
        gw_priority: 0
      forgejo_ext_net:
        ipv4_address: 192.168.254.10
    volumes:
      - ${FORGEJO_VOLUME_PATH}/forgejoApp/forgejo:/data
      - ${FORGEJO_VOLUME_PATH}/forgejoApp/certs:/etc/forgejo/certs:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - '3000:${FORGEJO__server__HTTP_PORT}'
      - '222:22'
    healthcheck:
      test: >
        HEALTH_RESPONSE=$(/usr/bin/curl --insecure --silent --fail-with-body ${FORGEJO__server__PROTOCOL:-http}://localhost:${FORGEJO__server__HTTP_PORT:-3000}/api/healthz) &&
        {
          echo "$HEALTH_RESPONSE" | /bin/grep "\"status\": \?\"pass\"" &>/dev/null &&
          ! echo "$HEALTH_RESPONSE" | /bin/grep "\"status\": \?\"fail\"" &>/dev/null &&
          ! echo "$HEALTH_RESPONSE" | /bin/grep "\"status\": \?\"warn\"" &>/dev/null;
        } ||
        {
          HEALTH_RESPONSE=$(echo "$HEALTH_RESPONSE" | tr "\n" " ");
          OUTPUT_FD="2";
          [ "${HEALTHCHECK_LOG_ERROR+x}" = "x" ] && OUTPUT_FD="/proc/1/fd/2";
          echo >&$OUTPUT_FD "Healthcheck failed: $HEALTH_RESPONSE";
        }
      start_period: 1m
      start_interval: 3s
      interval: 15s
      timeout: 5s
      retries: 3
    depends_on:
      forgejo-db:
        condition: service_healthy 
    labels:
      com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/forgejo.svg

# ===== DATABASE ===== 
  forgejo-db:
    image: postgres:14
    container_name: postgres
    volumes:
      - ${FORGEJO_VOLUME_PATH}/forgejoApp/postgres:/var/lib/postgresql/data

    environment:
      - POSTGRES_USER=${FORGEJO_DB_USERNAME}
      - POSTGRES_PASSWORD=${FORGEJO_DB_PASSWORD}
      - POSTGRES_DB=${FORGEJO_DB_NAME}
      - POSTGRES_DB_LISTENING_PORT=${POSTGRES_DB_PORT:-5432}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/pg_isready -U ${FORGEJO_DB_USERNAME} -h localhost -p ${POSTGRES_DB_PORT} -t 0 -q || exit 1"]
      start_period: 1m
      start_interval: 3s
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      forgejo_db_net:
        ipv4_address: 192.168.254.3
        gw_priority: 0
    labels:
      com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/postgresql.svg
      
  # ===== RUNNER =====
  runner:
    image: data.forgejo.org/forgejo/runner:12
    container_name: forgejo-runner
    environment:
      - DOCKER_HOST=tcp://docker-in-docker:2375
    restart: unless-stopped
    command: 'forgejo-runner daemon --config runner-config.yml'
    volumes:
      - forgejo-runner_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      forgejo_ext_net:
        ipv4_address: 192.168.254.11

    healthcheck:
      test: |
        sh -c 'ps aux | grep -q "[f]orgejo-runner" && 
               wget -q -O- http://docker-in-docker:2375/version > /dev/null && 
               echo "Runner healthy" || exit 1'
      start_period: 15s
      start_interval: 5s
      interval: 30s
      timeout: 10s
      retries: 3        
    depends_on:
      docker-in-docker:
        condition: service_healthy
      forgejo:
        condition: service_healthy
    labels:
      com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/forgejo.svg
      
# ===== DOCKER-IN-DOCKER =====  
      
  docker-in-docker:
    image: docker:dind
    container_name: 'docker_dind'
    depends_on:
      forgejo:
        condition: service_started
    privileged: 'true'
    command: ['dockerd', '-H', 'tcp://0.0.0.0:2375', '--tls=false']
    restart: 'unless-stopped'
    healthcheck:
      test: ["CMD", "docker", "ps"]
      start_period: 10s
      start_interval: 2s
      interval: 10s
      timeout: 5s
      retries: 3    
    networks:
      forgejo_ext_net:
        ipv4_address: 192.168.254.12

    volumes:
      - forgejo-runner_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      com.getarcaneapp.arcane.icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/svg/forgejo.svg
      

volumes:
  forgejo-runner_data:
    name: forgejo-runner
networks:
  forgejo_ext_net:
    name: forgejo_ext_net
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.254.8/29
          gateway: 192.168.254.9
  forgejo_db_net:
    name: forgejo_db_net
    internal: true
    ipam:
      config:
        - subnet: 192.168.254.0/29
          gateway: 192.168.254.1